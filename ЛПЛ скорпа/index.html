<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Турнирная таблица</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Турнирная таблица</h1>

        <div class="controls">
            <label for="num-participants">Количество участников:</label>
            <input type="number" id="num-participants" value="5" min="1">
            <button id="create-table-btn">Создать таблицу</button>
            <button id="end-tournament-btn" style="display: none;">Закончить турнир</button>
        </div>

        <table id="tournament-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Имя участника</th>
                    <th>Рейтинг</th>
                    <th>Рейтинг противника</th>
                    <th>Всего забито голов</th>
                    <th>Итого голов</th>
                </tr>
            </thead>
            <tbody>
                <!-- Table rows will be generated by JavaScript -->
            </tbody>
        </table>

        <div class="total-score">
            <p>Общий итог голов за тур: <span id="total-goals-span">0</span></p>
        </div>

        <!-- Legend section will be populated by JavaScript -->
        <div class="legend"></div>

        <!-- Pedestal section (initially hidden) -->
        <div id="pedestal-container" class="pedestal-container" style="display: none;">
            <h2>Турнир завершён!</h2>
            <div class="pedestal-simple"> <!-- Changed class name for simpler styles -->
                <div class="pedestal-step-simple">
                    <div class="player-rank-simple">1</div>
                    <div class="player-name-simple"></div>
                    <div class="player-goals-simple"></div>
                </div>
                <div class="pedestal-step-simple">
                    <div class="player-rank-simple">2</div>
                    <div class="player-name-simple"></div>
                    <div class="player-goals-simple"></div>
                </div>
                <div class="pedestal-step-simple">
                    <div class="player-rank-simple">3</div>
                    <div class="player-name-simple"></div>
                    <div class="player-goals-simple"></div>
                </div>
            </div>
            <button id="continue-tournament-btn">Cоздать новый турнир</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
